<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="RondaVizinho">
  <defs>
    <linearGradient id="ronda" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- arco de ronda: a órbita de vigilância que circunda e protege -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#ronda)" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="180 40" transform="rotate(-60 50 50)"/>
  <!-- o vigia na trajetória da ronda -->
  <circle cx="50" cy="8" r="6" fill="#10b981"/>
  <!-- casa protegida no centro -->
  <path d="M50 30 L72 48 66 48 66 70 34 70 34 48 28 48 Z" fill="#1e3a8a"/>
  <!-- janela-olho: vigilância amigável -->
  <circle cx="50" cy="56" r="6.5" fill="#e0f2fe"/>
  <circle cx="50" cy="56" r="2.8" fill="#1e3a8a"/>
</svg>
